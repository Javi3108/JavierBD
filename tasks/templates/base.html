<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django CRUD Application</title>
<style>
body{
  background: radial-gradient(circle at top left, #7c3aed33, transparent),
              radial-gradient(circle at bottom right, #06b6d433, transparent),
              #0f172a;
  color:#e2e8f0;
}
.navbar{
  background:linear-gradient(90deg,#7c3aed,#06b6d4) !important;
}
a.navbar-brand, .nav-link{color:white !important;font-weight:600;}
.btn-primary{
  background:linear-gradient(90deg,#7c3aed,#06b6d4);
  border:0;
}
</style>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="/">Inicio</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/">Inicio</a>
                        </li>

                        {% if user.is_authenticated %}
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'tasks' %}">Tareas Pending</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'tasks_completed' %}">Tareas Completado</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'tasks' %}">Tareas Pending</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/tasks/create/">Crear tarea</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/logout">Cerrar sesión</a>
                            </li>
                        {% else %}
                            <li>
                                <a class="nav-link" href="/signup">Registrarse</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/signin">Iniciar sesión</a>
                            </li>
                        {% endif %}
                    </ul>
            </div>
        </div>
    </nav>
    {% block content %}
    {% endblock %}
</body>
</html>
